<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件预览 | K-Vault</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="stylesheet" href="/theme.css">
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #17212b;
      --muted: #667085;
      --line: #dde3ea;
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --danger: #b42318;
      --code-bg: #101828;
      --code-text: #e6edf3;
      --shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .title-group {
      min-width: 0;
    }

    .title-group h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      font-weight: 700;
    }

    .title-group p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      min-height: 36px;
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: #b8c2cc;
      background: #f8fafc;
    }

    .btn.primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    .btn.primary:hover {
      background: var(--brand-dark);
      border-color: var(--brand-dark);
    }

    .file-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      margin: 18px auto 0;
      width: min(1180px, calc(100% - 32px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }

    .file-name {
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .file-meta {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 9px;
      background: #f8fafc;
    }

    .viewer-wrap {
      flex: 1;
      width: min(1180px, calc(100% - 32px));
      margin: 14px auto 24px;
      display: flex;
      min-height: 0;
    }

    .viewer {
      flex: 1;
      min-height: calc(100vh - 210px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .viewer.media {
      background: #070b12;
    }

    .preview-image,
    .preview-video {
      width: 100%;
      height: 100%;
      max-height: calc(100vh - 230px);
      object-fit: contain;
      display: block;
      background: #070b12;
    }

    .preview-video {
      min-height: 360px;
    }

    .preview-audio {
      width: min(720px, calc(100% - 40px));
    }

    .preview-pdf {
      width: 100%;
      height: calc(100vh - 220px);
      min-height: 520px;
      border: 0;
      background: #fff;
    }

    .doc-view,
    .text-view {
      width: 100%;
      height: calc(100vh - 220px);
      min-height: 520px;
      overflow: auto;
      align-self: stretch;
    }

    .text-view {
      margin: 0;
      padding: 20px;
      background: var(--code-bg);
      color: var(--code-text);
      font: 13px/1.6 Consolas, Monaco, "Courier New", monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .doc-view {
      padding: 32px;
      background: #eef2f6;
    }

    .doc-page {
      max-width: 860px;
      min-height: 680px;
      margin: 0 auto;
      padding: 42px 52px;
      background: #fff;
      border: 1px solid #d7dde5;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.1);
      color: #111827;
    }

    .doc-page h1,
    .doc-page h2,
    .doc-page h3 {
      margin: 18px 0 10px;
      line-height: 1.25;
    }

    .doc-page h1 {
      font-size: 26px;
    }

    .doc-page h2 {
      font-size: 21px;
    }

    .doc-page h3 {
      font-size: 17px;
    }

    .doc-page p {
      margin: 0 0 10px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .doc-page table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      table-layout: fixed;
    }

    .doc-page td,
    .doc-page th {
      border: 1px solid #cbd5e1;
      padding: 8px;
      vertical-align: top;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .sheet-section,
    .slide-section {
      margin: 0 0 22px;
    }

    .sheet-section h2,
    .slide-section h2 {
      margin-top: 0;
      font-size: 18px;
    }

    .sheet-table {
      font-size: 13px;
    }

    .status {
      max-width: 540px;
      padding: 32px;
      text-align: center;
      color: var(--muted);
    }

    .status strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 17px;
    }

    .status.error strong {
      color: var(--danger);
    }

    .deferred-gate {
      width: min(520px, calc(100% - 40px));
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 16px;
      padding: 28px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.78), rgba(37, 99, 235, 0.42)),
        radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.22), transparent 32%);
      box-shadow: 0 18px 46px rgba(2, 8, 23, 0.32);
      cursor: pointer;
      text-align: center;
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
    }

    .deferred-gate strong,
    .deferred-gate span {
      display: block;
    }

    .deferred-gate strong {
      margin-bottom: 8px;
      font-size: 18px;
    }

    .deferred-gate span {
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      line-height: 1.6;
    }

    .deferred-gate .gate-icon {
      width: 46px;
      height: 46px;
      margin: 0 auto 14px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.16);
      font-size: 20px;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid #d8dee7;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    body.embed {
      background: #070b12;
    }

    body.embed .topbar,
    body.embed .file-panel {
      display: none;
    }

    body.embed .viewer-wrap {
      width: 100%;
      margin: 0;
      min-height: 100vh;
    }

    body.embed .viewer {
      border: 0;
      border-radius: 0;
      min-height: 100vh;
      box-shadow: none;
    }

    body.embed .preview-image,
    body.embed .preview-video {
      max-height: 100vh;
    }

    body.embed .preview-pdf,
    body.embed .doc-view,
    body.embed .text-view {
      height: 100vh;
      min-height: 100vh;
    }

    :root {
      --bg: #f5f7fb;
      --panel: #fbfcff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ea;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --danger: #b42318;
      --code-bg: #0c1220;
      --code-text: #e7eef8;
      --shadow: 0 20px 56px rgba(15, 23, 42, 0.12);
      --accent: #f59e0b;
    }

    body {
      background:
        linear-gradient(180deg, #eef4f7 0%, #f7f8fb 48%, #eef2f7 100%);
    }

    .theme-floating-toggle,
    .theme-auto-inline-toggle,
    .theme-admin-toggle,
    [data-theme-toggle] {
      display: none !important;
    }

    .topbar {
      min-height: 68px;
      padding: 14px 24px;
      background: rgba(251, 252, 255, 0.92);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
    }

    .title-group h1 {
      font-size: 17px;
    }

    .title-group p {
      max-width: 62vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn {
      border-radius: 7px;
      font-weight: 650;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.85) inset;
    }

    .file-panel {
      border-radius: 8px;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.09);
    }

    .pill {
      border-radius: 7px;
      background: #f3f6fa;
      font-weight: 650;
    }

    .viewer {
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(247, 249, 252, 0.96)),
        #fff;
      box-shadow: 0 18px 52px rgba(15, 23, 42, 0.13);
    }

    .viewer.media {
      background:
        linear-gradient(180deg, rgba(8, 13, 22, 0.94), rgba(11, 18, 32, 0.98));
    }

    .viewer.media::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.42;
    }

    .preview-image {
      position: relative;
      z-index: 1;
      padding: 18px;
      background:
        linear-gradient(45deg, rgba(255, 255, 255, 0.04) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255, 255, 255, 0.04) 25%, transparent 25%),
        #070b12;
      background-size: 20px 20px;
      background-position: 0 0, 0 10px;
    }

    .media-frame,
    .audio-console,
    .summary-view,
    .archive-view,
    .font-view,
    .data-view,
    .markdown-view {
      position: relative;
      z-index: 1;
    }

    .media-frame {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 230px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .media-frame .preview-video {
      border-radius: 8px;
      background: #030712;
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.38);
    }

    .audio-console {
      width: min(760px, calc(100% - 40px));
      color: #fff;
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.94), rgba(19, 78, 74, 0.72)),
        #0b1220;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.36);
    }

    .audio-head {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 16px;
      align-items: center;
      margin-bottom: 22px;
    }

    .audio-mark {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #101828;
      background: linear-gradient(135deg, #f8fafc, #99f6e4 70%, #fbbf24);
      font-size: 27px;
      font-weight: 800;
    }

    .audio-title {
      min-width: 0;
    }

    .audio-title strong {
      display: block;
      overflow-wrap: anywhere;
      font-size: 18px;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .audio-title span,
    .summary-meta,
    .archive-meta {
      color: rgba(255, 255, 255, 0.68);
      font-size: 13px;
    }

    .audio-wave {
      height: 82px;
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 8px 0 24px;
      padding: 0 2px;
      overflow: hidden;
    }

    .audio-wave span {
      flex: 1;
      min-width: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, #fbbf24, #2dd4bf 55%, #60a5fa);
      opacity: 0.86;
    }

    .audio-wave span:nth-child(2n) { height: 42%; }
    .audio-wave span:nth-child(3n) { height: 76%; }
    .audio-wave span:nth-child(4n) { height: 55%; }
    .audio-wave span:nth-child(5n) { height: 92%; }

    .audio-console .preview-audio {
      width: 100%;
      display: block;
      accent-color: var(--brand);
    }

    .doc-view,
    .markdown-view,
    .data-view,
    .archive-view,
    .font-view,
    .summary-view {
      width: 100%;
      height: calc(100vh - 220px);
      min-height: 520px;
      overflow: auto;
      align-self: stretch;
      background: #eef2f6;
      padding: 26px;
    }

    .markdown-page,
    .data-page,
    .archive-page,
    .font-page,
    .summary-page {
      max-width: 980px;
      min-height: 100%;
      margin: 0 auto;
      padding: 34px;
      border: 1px solid #d7dde5;
      border-radius: 8px;
      background: #fff;
      color: #111827;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.1);
    }

    .markdown-page h1,
    .markdown-page h2,
    .markdown-page h3 {
      margin: 22px 0 12px;
      line-height: 1.25;
    }

    .markdown-page h1:first-child,
    .markdown-page h2:first-child,
    .markdown-page h3:first-child {
      margin-top: 0;
    }

    .markdown-page p,
    .markdown-page li {
      line-height: 1.78;
    }

    .markdown-page blockquote {
      margin: 16px 0;
      padding: 10px 14px;
      border-left: 4px solid var(--brand);
      background: #f4f8f8;
      color: #344054;
    }

    .markdown-page code,
    .markdown-page pre,
    .inline-code {
      font-family: Consolas, Monaco, "Courier New", monospace;
    }

    .markdown-page pre,
    .data-code {
      margin: 14px 0;
      padding: 16px;
      border-radius: 8px;
      background: var(--code-bg);
      color: var(--code-text);
      overflow: auto;
      line-height: 1.6;
      white-space: pre;
    }

    .data-summary,
    .summary-stack {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .data-summary {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .data-chip,
    .summary-chip {
      border: 1px solid #d8e0ea;
      border-radius: 8px;
      padding: 11px 12px;
      background: #f8fafc;
    }

    .data-chip strong,
    .summary-chip strong {
      display: block;
      margin-bottom: 3px;
      font-size: 12px;
      color: #667085;
    }

    .table-scroll,
    .archive-list {
      overflow: auto;
      border: 1px solid #d8e0ea;
      border-radius: 8px;
      background: #fff;
    }

    .table-preview {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .table-preview th,
    .table-preview td {
      border-bottom: 1px solid #e5ebf2;
      border-right: 1px solid #eef2f6;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
    }

    .table-preview th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      color: #475467;
      z-index: 1;
    }

    .archive-row {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 44px;
      padding: 8px 12px;
      border-bottom: 1px solid #edf1f5;
    }

    .archive-row:last-child {
      border-bottom: 0;
    }

    .archive-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .archive-entry-preview {
      margin-top: 16px;
      border: 1px solid #d8e0ea;
      border-radius: 8px;
      overflow: hidden;
      background: #0c1220;
    }

    .archive-entry-preview header {
      padding: 10px 12px;
      background: #f8fafc;
      color: #344054;
      font-weight: 700;
    }

    .archive-entry-preview pre {
      margin: 0;
      max-height: 360px;
      overflow: auto;
      padding: 14px;
      color: var(--code-text);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .font-sample {
      margin-top: 20px;
      padding: 22px;
      border-radius: 8px;
      border: 1px dashed #b7c4d2;
      background: #f8fafc;
    }

    .font-sample .font-large {
      margin: 0 0 12px;
      font-size: 42px;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .font-sample .font-body {
      margin: 0;
      font-size: 18px;
      line-height: 1.75;
    }

    .summary-icon {
      width: 54px;
      height: 54px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      margin-bottom: 14px;
      color: #101828;
      background: linear-gradient(135deg, #ccfbf1, #fef3c7);
      font-size: 24px;
      font-weight: 800;
    }

    .summary-page h2,
    .archive-page h2,
    .font-page h2,
    .data-page h2 {
      margin: 0 0 8px;
      line-height: 1.25;
    }

    .summary-page p,
    .archive-page p,
    .font-page p,
    .data-page p {
      color: #475467;
      line-height: 1.7;
    }

    .deferred-gate {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(8, 13, 22, 0.92), rgba(19, 78, 74, 0.76)),
        #0b1220;
    }

    .deferred-gate::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 18px 18px;
      filter: blur(1px);
      opacity: 0.44;
    }

    .deferred-gate > * {
      position: relative;
      z-index: 1;
    }

    body.embed {
      background: #070b12;
    }

    body.embed .viewer {
      background:
        linear-gradient(180deg, rgba(8, 13, 22, 0.94), rgba(11, 18, 32, 0.98));
    }

    body.embed .media-frame {
      min-height: 100vh;
    }

    body.embed .doc-view,
    body.embed .markdown-view,
    body.embed .data-view,
    body.embed .archive-view,
    body.embed .font-view,
    body.embed .summary-view {
      height: 100vh;
      min-height: 100vh;
    }

    /* 清爽版预览工作台：少装饰、浅色底、低饱和青绿强调。 */
    :root {
      --bg: #f3faf9;
      --panel: #ffffff;
      --text: #102027;
      --muted: #65777d;
      --line: #d8e8e6;
      --brand: #0f8f8a;
      --brand-dark: #0a6f6b;
      --danger: #b42318;
      --code-bg: #102027;
      --code-text: #e6f4f1;
      --shadow: 0 18px 42px rgba(15, 74, 78, 0.1);
      --accent: #7bb8ad;
    }

    body,
    body.embed {
      background:
        linear-gradient(180deg, #f4fbfa 0%, #edf7f5 100%);
    }

    .topbar {
      min-height: 64px;
      border-bottom-color: rgba(15, 143, 138, 0.16);
      background: rgba(255, 255, 255, 0.88);
    }

    .btn {
      border-radius: 8px;
      box-shadow: none;
    }

    .btn.primary {
      background: var(--brand);
      border-color: var(--brand);
    }

    .btn.primary:hover {
      background: var(--brand-dark);
      border-color: var(--brand-dark);
    }

    .file-panel,
    .viewer,
    .markdown-page,
    .data-page,
    .archive-page,
    .email-page,
    .font-page,
    .summary-page {
      border-color: rgba(15, 143, 138, 0.16);
      box-shadow: var(--shadow);
    }

    .viewer,
    body.embed .viewer,
    .viewer.media {
      background: #fbfffe;
    }

    .viewer.media::before {
      background-image:
        linear-gradient(rgba(15, 143, 138, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 143, 138, 0.045) 1px, transparent 1px);
      opacity: 0.42;
    }

    .preview-image {

    @media (max-width: 720px) {

      .viewer,

  </style>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="title-group">
        <h1>文件预览</h1>
        <p id="subtitle">K-Vault 本地预览器</p>
      </div>
      <div class="actions">
        <button class="btn" type="button" id="copyBtn">复制直链</button>
        <button class="btn" type="button" id="openBtn">新标签打开</button>
        <button class="btn primary" type="button" id="downloadBtn">下载文件</button>
      </div>
    </header>

    <section class="file-panel">
      <div>
        <h2 class="file-name" id="fileName">-</h2>
        <div class="file-meta">
          <span class="pill" id="fileType">未知类型</span>
          <span class="pill" id="fileSize" hidden></span>
          <span class="pill" id="storageHint">本地预览</span>
        </div>
      </div>
    </section>

    <main class="viewer-wrap">
      <div class="viewer" id="viewer">
        <div class="status">
          <div class="spinner"></div>
          <strong>正在加载预览</strong>
          <span>请稍候</span>
        </div>
      </div>
    </main>
  </div>

  <script>
    (() => {
      "use strict";

      const IMAGE_EXTS = new Set(["jpg", "jpeg", "jfif", "pjpeg", "pjp", "png", "apng", "gif", "webp", "bmp", "tif", "tiff", "svg", "ico", "avif", "heic", "heif", "jxl"]);
      const VIDEO_EXTS = new Set(["mp4", "webm", "ogg", "ogv", "mov", "m4v", "m3u8", "avi", "mkv", "wmv", "flv", "3gp", "ts", "mts", "m2ts"]);
      const AUDIO_EXTS = new Set(["mp3", "mpeg", "wav", "ogg", "oga", "flac", "aac", "m4a", "opus", "weba", "midi", "mid", "wma", "ape", "aif", "aiff"]);
      const MARKDOWN_EXTS = new Set(["md", "markdown", "mdown"]);
      const JSON_EXTS = new Set(["json", "jsonc", "json5", "ipynb"]);
      const TABLE_EXTS = new Set(["csv", "tsv"]);
      const ARCHIVE_EXTS = new Set(["zip", "zipx", "jar", "war", "ear", "apk", "cbz", "cbr", "rar", "7z", "tar", "tgz", "gz", "gzip", "bz2", "bzip2", "tbz", "tbz2", "xz", "txz", "lzma", "zst", "tzst", "cab", "ar", "cpio", "iso", "xar", "lha", "lzh"]);
      const LOCAL_ARCHIVE_EXTS = new Set(["zip", "jar", "tar", "tgz", "gz", "gzip"]);
      const FONT_EXTS = new Set(["ttf", "otf", "woff", "woff2"]);
      const EMAIL_EXTS = new Set(["eml", "msg", "mbox"]);
      const DRAWING_EXTS = new Set(["drawio", "dio", "excalidraw", "mermaid", "mmd", "plantuml", "puml"]);
      const GEO_EXTS = new Set(["geojson", "kml", "gpx", "shp"]);
      const MODEL_EXTS = new Set(["glb", "gltf", "obj", "stl", "ply", "fbx", "dae", "3ds", "3mf", "amf", "usd", "usda", "usdc", "usdz", "kmz", "pcd", "wrl", "vrml", "xyz", "vtk", "vtp", "step", "stp", "iges", "igs", "ifc", "3dm"]);
      const CAD_EXTS = new Set(["dwg", "dxf", "dwf", "dwfx", "xps"]);
      const EBOOK_EXTS = new Set(["epub", "umd"]);
      const MINDMAP_EXTS = new Set(["xmind"]);
      const TYPESET_EXTS = new Set(["ofd", "typ", "typst"]);
      const EDA_EXTS = new Set(["olb", "dra", "gds", "oas", "oasis"]);
      const DATA_ASSET_EXTS = new Set(["psd", "ai", "eps", "sqlite", "sqlite3", "db", "parquet", "avro", "wasm", "webarchive"]);
      const SUMMARY_EXTS = new Set([
        ...DATA_ASSET_EXTS, ...CAD_EXTS, ...TYPESET_EXTS, ...MINDMAP_EXTS, ...DRAWING_EXTS,
        ...EBOOK_EXTS, ...GEO_EXTS, ...MODEL_EXTS, ...EDA_EXTS
      ]);
      const TEXT_EXTS = new Set([
        "txt", "xml", "html", "htm", "css", "js", "mjs", "ts", "tsx", "jsx", "vue",
        "py", "java", "c", "cpp", "h", "hpp", "go", "rs", "sh", "bat", "ps1", "sql",
        "yaml", "yml", "toml", "ini", "conf", "cfg", "log", "patch", "diff", "bundle", "bdl",
        "proto", "hcl", "tex", "gv", "graphql", "http", "rb", "swift", "kt", "kts", "php", "cs",
        "cjs", "bash", "cc"
      ]);
      const OFFICE_KIND_BY_EXT = {
        docx: "docx", docm: "docx", dotx: "docx", dotm: "docx",
        xlsx: "xlsx", xlsm: "xlsx", xltx: "xlsx", xltm: "xlsx",
        pptx: "pptx", pptm: "pptx", ppsx: "pptx", ppsm: "pptx", potx: "pptx", potm: "pptx"
      };
      const OFFICE_COMPAT_EXTS = new Set(["doc", "dot", "rtf", "odt", "xls", "xlsb", "xlt", "xltm", "ods", "fods", "numbers", "ppt", "odp"]);
      const OPEN_XML_EXTS = new Set(Object.keys(OFFICE_KIND_BY_EXT));
      const ENHANCED_VIEWER_EXTS = new Set([
        ...OPEN_XML_EXTS, ...OFFICE_COMPAT_EXTS, "pdf", ...TYPESET_EXTS, ...ARCHIVE_EXTS, ...EMAIL_EXTS,
        ...CAD_EXTS, ...MODEL_EXTS, ...GEO_EXTS, ...MINDMAP_EXTS, ...DRAWING_EXTS, ...EBOOK_EXTS,
        ...DATA_ASSET_EXTS, ...EDA_EXTS, "m3u8", "midi", "mid", "heic", "heif", "jxl"
      ]);
      const FILE_VIEWER_CDN = "https://cdn.jsdelivr.net/npm/@file-viewer/web-full@latest/dist/flyfish-file-viewer-web-full.iife.js";
      let enhancedViewerPromise = null;

      const params = new URLSearchParams(window.location.search);
      const state = {
        fileUrl: "",
        fileName: "",
        fileSize: Number(params.get("size") || 0),
        contentType: "",
        kind: "unsupported",
        extension: "",
        autoplay: params.get("autoplay") === "1" || params.get("autoplay") === "true",
        defer: params.get("defer") === "1" || params.get("defer") === "true"
      };

      const els = {
        viewer: document.getElementById("viewer"),
        fileName: document.getElementById("fileName"),
        fileType: document.getElementById("fileType"),
        fileSize: document.getElementById("fileSize"),
        storageHint: document.getElementById("storageHint"),
        subtitle: document.getElementById("subtitle"),
        copyBtn: document.getElementById("copyBtn"),
        openBtn: document.getElementById("openBtn"),
        downloadBtn: document.getElementById("downloadBtn")
      };

      if (params.get("embed") === "1" || params.get("embed") === "true") {
        document.body.classList.add("embed");
      }

      els.copyBtn.addEventListener("click", copyDirectLink);
      els.openBtn.addEventListener("click", () => {
        if (state.fileUrl) window.open(state.fileUrl, "_blank", "noopener,noreferrer");
      });
      els.downloadBtn.addEventListener("click", downloadFile);

      init();

      async function init() {
        try {
          state.fileUrl = resolveRequestedUrl();
          if (!state.fileUrl) {
            showStatus("缺少预览参数", "请提供 file、f 或 url 参数。", "error");
            return;
          }

          await hydrateFileInfo();
          state.extension = getExtension(state.fileName) || getExtension(urlPathName(state.fileUrl));
          state.kind = getPreviewKind(state.extension, state.contentType);
          updateHeader();
          if (state.defer) {
            renderDeferredGate();
            return;
          }
          await renderPreview();
        } catch (error) {
          console.error("Preview failed:", error);
          showStatus("预览加载失败", error.message || "文件无法预览。", "error");
        }
      }

      function resolveRequestedUrl() {
        const directUrl = params.get("url") || params.get("src");
        if (directUrl) return toAbsoluteUrl(directUrl);

        const file = params.get("file") || params.get("f") || params.get("id");
        if (!file) return "";
        if (/^https?:\/\//i.test(file) || file.startsWith("/")) return toAbsoluteUrl(file);
        return toAbsoluteUrl(`/file/${encodeURIComponent(file)}`);
      }

      function toAbsoluteUrl(value) {
        try {
          return new URL(value, window.location.origin).href;
        } catch {
          return "";
        }
      }

      async function hydrateFileInfo() {
        const hintedTitle = params.get("title") || params.get("name");
        const fileId = getLocalFileId(state.fileUrl);
        let metadata = null;

        if (fileId) {
          metadata = await fetchFileInfo(fileId);
        }

        state.fileName = hintedTitle
          || metadata?.fileName
          || metadata?.originalName
          || fileNameFromUrl(state.fileUrl)
          || fileId
          || "download";

        const hintedSize = Number(params.get("size") || 0);
        state.fileSize = Number(metadata?.fileSize || hintedSize || state.fileSize || 0);

        try {
          const response = await fetch(state.fileUrl, {
            method: "HEAD",
            credentials: "include"
          });
          if (response.ok || response.status === 206) {
            state.contentType = response.headers.get("Content-Type") || "";
            const contentLength = Number(response.headers.get("Content-Length") || 0);
            if (!state.fileSize && Number.isFinite(contentLength)) state.fileSize = contentLength;

            if (!hintedTitle && !metadata?.fileName) {
              const headerName = parseContentDisposition(response.headers.get("Content-Disposition") || "");
              if (headerName) state.fileName = headerName;
            }
          }
        } catch (error) {
          console.warn("HEAD request skipped:", error);
        }
      }

      async function fetchFileInfo(fileId) {
        try {
          const response = await fetch(`/api/file-info/${encodeURIComponent(fileId)}`, {
            credentials: "include"
          });
          if (!response.ok) return null;
          return await response.json();
        } catch (error) {
          console.warn("File info request skipped:", error);
          return null;
        }
      }

      function getLocalFileId(fileUrl) {
        try {
          const url = new URL(fileUrl);
          if (url.origin !== window.location.origin) return "";
          if (!url.pathname.startsWith("/file/")) return "";
          return decodeURIComponent(url.pathname.slice("/file/".length));
        } catch {
          return "";
        }
      }

      function fileNameFromUrl(fileUrl) {
        try {
          const url = new URL(fileUrl, window.location.origin);
          const last = decodeURIComponent(url.pathname.split("/").filter(Boolean).pop() || "");
          return last || "";
        } catch {
          return "";
        }
      }

      function urlPathName(fileUrl) {
        try {
          return new URL(fileUrl, window.location.origin).pathname;
        } catch {
          return fileUrl;
        }
      }

      function parseContentDisposition(value) {
        const encoded = value.match(/filename\*=UTF-8''([^;]+)/i);
        if (encoded) {
          try {
            return decodeURIComponent(encoded[1].trim().replace(/^"|"$/g, ""));
          } catch {
            return "";
          }
        }

        const plain = value.match(/filename="?([^";]+)"?/i);
        if (!plain) return "";
        try {
          return decodeURIComponent(plain[1]);
        } catch {
          return plain[1];
        }
      }

      function getExtension(name) {
        const clean = String(name || "").split(/[?#]/)[0];
        const last = clean.split("/").pop() || "";
        const index = last.lastIndexOf(".");
        return index >= 0 ? last.slice(index + 1).toLowerCase() : "";
      }

      function getPreviewKind(ext, contentType) {
        const type = String(contentType || "").split(";")[0].trim().toLowerCase();
        if (type.startsWith("image/") || IMAGE_EXTS.has(ext)) return "image";
        if (type.startsWith("video/") || VIDEO_EXTS.has(ext)) return "video";
        if (type.startsWith("audio/") || AUDIO_EXTS.has(ext)) return "audio";
        if (type === "application/pdf" || ext === "pdf") return "pdf";
        if (OPEN_XML_EXTS.has(ext)) return OFFICE_KIND_BY_EXT[ext];
        if (OFFICE_COMPAT_EXTS.has(ext)) return "office";
        if (EMAIL_EXTS.has(ext)) return "email";
        if (MARKDOWN_EXTS.has(ext)) return "markdown";
        if (JSON_EXTS.has(ext)) return "json";
        if (TABLE_EXTS.has(ext)) return "table";
        if (ARCHIVE_EXTS.has(ext)) return "archive";
        if (FONT_EXTS.has(ext)) return "font";
        if (SUMMARY_EXTS.has(ext)) return "summary";
        if (type.startsWith("text/") || TEXT_EXTS.has(ext)) return "text";
        return "unsupported";
      }

      function updateHeader() {
        document.title = `${state.fileName} | K-Vault`;
        els.fileName.textContent = state.fileName;
        els.fileType.textContent = displayTypeName(state.kind, state.extension);
        els.subtitle.textContent = state.fileUrl;
        if (els.storageHint) {
          els.storageHint.textContent = shouldUseEnhancedViewer() ? "增强预览" : "本地预览";
        }
        if (state.fileSize > 0) {
          els.fileSize.hidden = false;
          els.fileSize.textContent = formatSize(state.fileSize);
        }
      }

      function displayTypeName(kind, ext) {
        const suffix = ext ? ext.toUpperCase() : "文件";
        const names = {
          image: "图片",
          video: "视频",
          audio: "音频",
          pdf: "PDF",
          docx: "Word 文档",
          xlsx: "Excel 表格",
          pptx: "演示文稿",
          office: "Office 文档",
          email: "邮件",
          markdown: "Markdown 文档",
          json: "JSON 数据",
          table: "表格数据",
          archive: "压缩包",
          font: "字体",
          summary: "安全摘要",
          text: "文本"
        };
        return `${names[kind] || "暂不支持"} · ${suffix}`;
      }

      function formatSize(bytes) {
        const units = ["B", "KB", "MB", "GB", "TB"];
        let value = Number(bytes) || 0;
        let unit = 0;
        while (value >= 1024 && unit < units.length - 1) {
          value /= 1024;
          unit += 1;
        }
        return `${value.toFixed(unit === 0 ? 0 : 2)} ${units[unit]}`;
      }

      function renderDeferredGate() {
        setViewerClass();
        clearViewer();

        const button = document.createElement("button");
        button.type = "button";
        button.className = "deferred-gate";

        const icon = document.createElement("span");
        icon.className = "gate-icon";
        icon.textContent = state.kind === "video" || state.kind === "audio" ? "▶" : "◉";

        const title = document.createElement("strong");
        title.textContent = "点击加载预览";

        const detail = document.createElement("span");
        const sizeText = state.fileSize > 0 ? ` · ${formatSize(state.fileSize)}` : "";
        detail.textContent = `${displayTypeName(state.kind, state.extension)}${sizeText}。预览器会在点击后再读取文件内容。`;

        button.append(icon, title, detail);
        button.addEventListener("click", async () => {
          state.defer = false;
          try {
            await renderPreview();
          } catch (error) {
            console.error("Deferred preview failed:", error);
            showStatus("预览加载失败", error.message || "文件无法预览。", "error");
          }
        });

        els.viewer.appendChild(button);
      }

      async function renderPreview() {
        setViewerClass();

        if (shouldUseEnhancedViewer()) {
          try {
            await renderEnhancedFileViewer();
            return;
          } catch (error) {
            console.warn("Enhanced viewer fallback:", error);
            setViewerClass();
          }
        }

        if (state.kind === "image") {
          renderImage();
        } else if (state.kind === "video") {
          renderVideo();
        } else if (state.kind === "audio") {
          renderAudio();
        } else if (state.kind === "pdf") {
          renderPdf();
        } else if (state.kind === "markdown") {
          await renderMarkdown();
        } else if (state.kind === "json") {
          await renderJson();
        } else if (state.kind === "table") {
          await renderTableData();
        } else if (state.kind === "archive") {
          await renderArchive();
        } else if (state.kind === "font") {
          await renderFont();
        } else if (state.kind === "email") {
          await renderEmail();
        } else if (state.kind === "office") {
          renderCapabilitySummary();
        } else if (state.kind === "summary") {
          renderCapabilitySummary();
        } else if (state.kind === "text") {
          await renderText();
        } else if (["docx", "xlsx", "pptx"].includes(state.kind)) {
          await renderOpenXml(state.kind);
        } else {
          showStatus("此格式暂不支持在线预览", "可以直接下载后用本地应用打开。");
        }
      }

      function shouldUseEnhancedViewer() {
        if (!ENHANCED_VIEWER_EXTS.has(state.extension)) return false;
        if (params.get("engine") === "local") return false;
        if (/^data:/i.test(state.fileUrl)) return false;
        return true;
      }

      async function renderEnhancedFileViewer() {
        showStatus("正在启动增强预览", "命中重型业务附件，将按需加载专用浏览器端渲染器。");
        await loadEnhancedViewerEngine();

        clearViewer();
        els.viewer.className = "viewer enhanced";
        els.viewer.dataset.kind = state.kind;
        if (els.storageHint) els.storageHint.textContent = "增强预览";

        const wrapper = document.createElement("div");
        wrapper.className = "enhanced-view";
        const shell = document.createElement("div");
        shell.className = "enhanced-shell";
        const viewer = document.createElement("flyfish-file-viewer");
        viewer.setAttribute("src", state.fileUrl);
        viewer.setAttribute("theme", "light");
        viewer.setAttribute("toolbar-position", "bottom-right");

            const existing = document.querySelector("script[data-file-viewer-engine]");
            if (existing) {
              existing.addEventListener("load", resolve, { once: true });
              existing.addEventListener("error", () => reject(new Error("增强预览脚本加载失败。")), { once: true });
              return;
            }

            const script = document.createElement("script");
            script.src = params.get("engineCdn") || FILE_VIEWER_CDN;
            script.async = true;
            script.dataset.fileViewerEngine = "1";
            script.onload = resolve;
            script.onerror = () => reject(new Error("增强预览脚本加载失败。"));
            document.head.appendChild(script);
          }).then(() => customElements.whenDefined("flyfish-file-viewer"));
        }
        await Promise.race([
          enhancedViewerPromise,
          new Promise((_, reject) => window.setTimeout(() => reject(new Error("增强预览启动超时。")), 12000))
        ]);
      }

      async function renderMarkdown() {
        showStatus("正在渲染 Markdown", "以只读阅读面展示，不执行文档中的脚本。");
        const text = await fetchText("Markdown");
        clearViewer();

        const wrapper = document.createElement("div");

      function appendMarkdown(page, source) {
        const lines = String(source || "").replace(/\r\n/g, "\n").split("\n");
        let paragraph = [];
        let list = null;
        let codeLines = null;

        const flushParagraph = () => {
          if (!paragraph.length) return;
          const p = document.createElement("p");
          appendInlineText(p, paragraph.join(" "));
          page.appendChild(p);
          paragraph = [];
        };

        const closeList = () => {
          if (list) {
            page.appendChild(list);
            list = null;
          }
        };

        for (const line of lines) {
          const fence = line.match(/^```/);
          if (fence && codeLines) {
            const pre = document.createElement("pre");
            const code = document.createElement("code");
            code.textContent = codeLines.join("\n");
            pre.appendChild(code);
            page.appendChild(pre);
            codeLines = null;
            continue;
          }
          if (codeLines) {
            codeLines.push(line);
            continue;
          }
          if (fence) {
            flushParagraph();
            closeList();
            codeLines = [];
            continue;
          }

          if (!line.trim()) {
            flushParagraph();
            closeList();
            continue;
          }

          const heading = line.match(/^(#{1,3})\s+(.+)$/);
          if (heading) {
            flushParagraph();
            closeList();
            const level = Math.min(3, heading[1].length);
            const h = document.createElement(`h${level}`);
            appendInlineText(h, heading[2].trim());
            page.appendChild(h);
            continue;
          }

          const quote = line.match(/^>\s?(.+)$/);
          if (quote) {
            flushParagraph();
            closeList();
            const block = document.createElement("blockquote");
            appendInlineText(block, quote[1].trim());
            page.appendChild(block);
            continue;
          }

          const bullet = line.match(/^\s*(?:[-*+]|\d+\.)\s+(.+)$/);
          if (bullet) {
            flushParagraph();
            if (!list) list = /^\s*\d+\./.test(line) ? document.createElement("ol") : document.createElement("ul");
            const item = document.createElement("li");
            appendInlineText(item, bullet[1].trim());
            list.appendChild(item);
            continue;
          }

          paragraph.push(line.trim());
        }

        if (codeLines) {
          const pre = document.createElement("pre");
          const code = document.createElement("code");
          code.textContent = codeLines.join("\n");
          pre.appendChild(code);
          page.appendChild(pre);
        }
        flushParagraph();
        closeList();

        if (!page.childElementCount) {
          const empty = document.createElement("p");
          empty.textContent = "Markdown 文件没有可展示的内容。";
          page.appendChild(empty);
        }
      }

      function appendInlineText(parent, text) {
        const parts = String(text || "").split(/(`[^`]+`)/g);
        for (const part of parts) {
          if (part.startsWith("`") && part.endsWith("`") && part.length > 1) {
            const code = document.createElement("code");
            code.className = "inline-code";
            code.textContent = part.slice(1, -1);
            parent.appendChild(code);
          } else if (part) {
            parent.appendChild(document.createTextNode(part));
          }
        }
      }

      async function renderJson() {
        showStatus("正在解析 JSON", "会先在浏览器本地格式化，解析失败时回退为源码预览。");
        const text = await fetchText("JSON");
        let formatted = text;
        let summary = "源码";
        let valid = false;

        try {
          const parsed = JSON.parse(stripJsonComments(text));
          formatted = JSON.stringify(parsed, null, 2);
          summary = summarizeJsonValue(parsed);
          valid = true;
        } catch (error) {
          summary = error.message || "解析失败";
        }

        const wrapper = createPagedView("data-view", "data-page");
        const page = wrapper.firstElementChild;
        appendPageHeading(page, valid ? "JSON 结构预览" : "JSON 源码预览", valid ? "已格式化为只读结构，适合快速检查 API 响应、配置和元数据。" : "文件不是严格 JSON，已按源码安全展示。");
        page.appendChild(createDataSummary([
          ["状态", valid ? "解析成功" : "回退源码"],
          ["结构", summary],
          ["大小", state.fileSize > 0 ? formatSize(state.fileSize) : "未知"],
          ["行数", String(formatted.split("\n").length)]
        ]));

        const pre = document.createElement("pre");
        pre.className = "data-code";
        pre.textContent = formatted;
        page.appendChild(pre);

        clearViewer();
        els.viewer.appendChild(wrapper);
      }

      function stripJsonComments(text) {
        return String(text || "")
          .replace(/^\uFEFF/, "")
          .replace(/\/\*[\s\S]*?\*\//g, "")
          .replace(/(^|[^:])\/\/.*$/gm, "$1")
          .replace(/,\s*([}\]])/g, "$1");
      }

      function summarizeJsonValue(value) {
        if (Array.isArray(value)) return `数组 · ${value.length} 项`;
        if (value && typeof value === "object") return `对象 · ${Object.keys(value).length} 个键`;
        if (value === null) return "null";
        return typeof value;
      }

      async function renderTableData() {
        showStatus("正在读取表格数据", "CSV/TSV 会转换成可横向滚动的只读表格。");
        const text = await fetchText("表格");
        const delimiter = state.extension === "tsv" ? "\t" : ",";
        const rows = parseDelimited(text, delimiter).filter((row) => row.some((cell) => cell !== ""));

        if (!rows.length) {
          showStatus("表格为空", "没有读取到可展示的行。");
          return;
        }

        const maxCols = Math.min(40, Math.max(...rows.map((row) => row.length)));
        const previewRows = rows.slice(0, 260);
        const wrapper = createPagedView("data-view", "data-page");
        const page = wrapper.firstElementChild;
        appendPageHeading(page, `${state.extension.toUpperCase()} 表格预览`, "只渲染前 260 行和前 40 列，避免大文件阻塞浏览器。");
        page.appendChild(createDataSummary([
          ["总行数", String(rows.length)],
          ["预览行", String(previewRows.length)],
          ["列数", String(maxCols)],
          ["大小", state.fileSize > 0 ? formatSize(state.fileSize) : "未知"]
        ]));

        const scroll = document.createElement("div");
        scroll.className = "table-scroll";
        const table = document.createElement("table");
        table.className = "table-preview";

        const thead = document.createElement("thead");
        const headerRow = document.createElement("tr");
        const header = previewRows[0] || [];
        for (let col = 0; col < maxCols; col += 1) {
          const th = document.createElement("th");
          th.textContent = header[col] || `列 ${col + 1}`;
          headerRow.appendChild(th);
        }
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        for (const row of previewRows.slice(1)) {
          const tr = document.createElement("tr");
          for (let col = 0; col < maxCols; col += 1) {
            const td = document.createElement("td");
            td.textContent = row[col] || "";
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        scroll.appendChild(table);
        page.appendChild(scroll);

        clearViewer();
        els.viewer.appendChild(wrapper);
      }

      function parseDelimited(text, delimiter) {
        const rows = [];
        let row = [];
        let cell = "";
        let quoted = false;
        const input = String(text || "");

        for (let index = 0; index < input.length; index += 1) {
          const char = input[index];
          const next = input[index + 1];

          if (char === '"' && quoted && next === '"') {
            cell += '"';
            index += 1;
            continue;
          }
          if (char === '"') {
            quoted = !quoted;
            continue;
          }
          if (!quoted && char === delimiter) {
            row.push(cell);
            cell = "";
            continue;
          }
          if (!quoted && (char === "\n" || char === "\r")) {
            if (char === "\r" && next === "\n") index += 1;
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
            continue;
          }
          cell += char;
        }

        row.push(cell);
        rows.push(row);
        return rows;
      }

      async function renderArchive() {
        const ext = state.extension;
        if (!LOCAL_ARCHIVE_EXTS.has(ext)) {
          renderCapabilitySummary({
            title: "压缩包已识别",
            detail: "此压缩格式已进入增强预览候选。增强引擎不可用时，K-Vault 不会在本地回退模式整包下载解析，避免大文件阻塞浏览器。",
            category: "归档容器",
            notes: [["策略", "ZIP/JAR/TAR/TAR.GZ 可本地读取目录。"], ["建议", "RAR、7Z、XZ、ZST 等格式使用增强预览或下载到本地工具打开。"]]
          });
          return;
        }
        showStatus("正在读取压缩包目录", "仅在需要时解析目录，避免一次性展开大文件。");
        const response = await fetch(state.fileUrl, { credentials: "include" });
        if (!response.ok) throw new Error(`压缩包读取失败：HTTP ${response.status}`);
        const buffer = await response.arrayBuffer();

        if (ext === "zip" || ext === "jar") {
          const zip = await loadZip(buffer);
          renderArchivePage("ZIP 压缩包目录", zip.entries(), zip);
          return;
        }

        if (ext === "tar") {
          const tar = createTarSource(buffer);
          renderArchivePage("TAR 归档目录", tar.entries(), tar);
          return;
        }

        if ((ext === "tgz" || ext === "gz" || ext === "gzip") && "DecompressionStream" in window) {
          try {
            const stream = new Blob([buffer]).stream().pipeThrough(new DecompressionStream("gzip"));
            const inflated = await new Response(stream).arrayBuffer();
            if (ext === "tgz" || /\.tar\.gz$/i.test(state.fileName)) {
              const tar = createTarSource(inflated);
              renderArchivePage("TAR.GZ 归档目录", tar.entries(), tar);
              return;
            }
          } catch (error) {
            console.warn("gzip preview skipped:", error);
          }
        }

        renderCapabilitySummary({
          title: "压缩包已识别",
          detail: "当前轻量预览已支持 ZIP/JAR 目录读取和 TAR/TAR.GZ 目录读取。RAR、7Z、BZ2、XZ 需要更重的 WASM 解压器，建议下载或后续接入专用渲染器。",
          category: "归档容器"
        });
      }

      function canPreviewArchiveEntry(entry) {
        if (entry.isDirectory) return false;
        const ext = getExtension(entry.name);
        const size = Number(entry.uncompressedSize || 0);
        if (size > 2 * 1024 * 1024) return false;
        return IMAGE_EXTS.has(ext) || TEXT_EXTS.has(ext) || MARKDOWN_EXTS.has(ext) || JSON_EXTS.has(ext) || TABLE_EXTS.has(ext);
      }

      async function previewArchiveEntry(source, entry, previewBox) {
        previewBox.hidden = false;
        previewBox.replaceChildren();
        const header = document.createElement("header");
        header.textContent = entry.name;
        previewBox.appendChild(header);

        try {
          const data = await source.bytes(entry.name);
          if (!data) throw new Error("没有读取到内部文件内容。");
          const ext = getExtension(entry.name);
          if (IMAGE_EXTS.has(ext)) {
            const image = document.createElement("img");
            image.alt = entry.name;
            image.src = URL.createObjectURL(new Blob([data], { type: mimeForExtension(ext) }));
            image.style.maxWidth = "100%";
            image.style.display = "block";
            image.style.background = "#111827";
            previewBox.appendChild(image);
            return;
          }

          const text = new TextDecoder("utf-8").decode(data);
          const pre = document.createElement("pre");
          pre.textContent = JSON_EXTS.has(ext) ? tryFormatJson(text) : text;
          previewBox.appendChild(pre);
        } catch (error) {
          const pre = document.createElement("pre");
          pre.textContent = error.message || "内部文件预览失败。";
          previewBox.appendChild(pre);
        }
      }

      function tryFormatJson(text) {
        try {
          return JSON.stringify(JSON.parse(stripJsonComments(text)), null, 2);
        } catch {
          return text;
        }
      }

      function mimeForExtension(ext) {
        const map = {
          jpg: "image/jpeg", jpeg: "image/jpeg", png: "image/png", gif: "image/gif",
          webp: "image/webp", svg: "image/svg+xml", bmp: "image/bmp", ico: "image/x-icon",
          avif: "image/avif"
        };
        return map[ext] || "application/octet-stream";
      }

      function createTarSource(arrayBuffer) {
        const bytes = new Uint8Array(arrayBuffer);
        const entries = [];
        let offset = 0;

        while (offset + 512 <= bytes.length) {
          const header = bytes.slice(offset, offset + 512);
          if (header.every((byte) => byte === 0)) break;

          const name = readTarString(header, 0, 100);
          const prefix = readTarString(header, 345, 155);
          const fullName = [prefix, name].filter(Boolean).join("/");
          const size = parseInt(readTarString(header, 124, 12).trim() || "0", 8) || 0;
          const typeFlag = String.fromCharCode(header[156] || 0);
          const dataStart = offset + 512;
          const isDirectory = typeFlag === "5" || fullName.endsWith("/");

          if (fullName) {
            entries.push({
              name: fullName,
              uncompressedSize: size,
              compressedSize: size,
              method: "tar",
              dataStart,
              isDirectory
            });
          }

          offset = dataStart + Math.ceil(size / 512) * 512;
        }

        return {
          entries: () => entries,
          bytes: async (name) => {
            const entry = entries.find((item) => item.name === name);
            if (!entry) return null;
            return bytes.slice(entry.dataStart, entry.dataStart + entry.uncompressedSize);
          }
        };
      }

      function readTarString(bytes, start, length) {
        return new TextDecoder("utf-8")
          .decode(bytes.slice(start, start + length))
          .replace(/\0.*$/g, "");
      }

      async function renderEmail() {
        if (state.extension === "msg") {
          renderCapabilitySummary({
            title: "Outlook 邮件已识别",
            detail: "MSG 属于复合二进制邮件容器。增强预览可用时会交给 File Viewer 邮件渲染器；本地回退模式提供安全摘要，避免误读私有二进制内容。",

          return;
        }

        showStatus("正在解析邮件", "会在浏览器本地提取头信息、正文和附件清单。");
        const text = await fetchText("邮件");
        const mailText = state.extension === "mbox" ? firstMboxMessage(text) : text;
        const parsed = parseEmailMessage(mailText);
        clearViewer();

        const wrapper = document.createElement("div");
        wrapper.className = "email-view";
        const page = document.createElement("article");
        page.className = "email-page";
        appendPageHeading(page, parsed.subject || "邮件预览", "只读展示邮件头信息、正文和附件名称，不执行邮件中的脚本。");

        const header = document.createElement("div");
        header.className = "email-header";
        appendEmailField(header, "发件人", parsed.from || "未知");
        appendEmailField(header, "收件人", parsed.to || "未知");
        appendEmailField(header, "时间", parsed.date || "未知");
        appendEmailField(header, "主题", parsed.subject || "无主题");
        page.appendChild(header);

        const body = document.createElement("div");
        body.className = "email-body";
        body.textContent = parsed.body || "没有提取到可读正文。";
        page.appendChild(body);

        if (parsed.attachments.length) {
          const list = document.createElement("div");
          list.className = "email-attachments";
          const heading = document.createElement("h3");
          heading.textContent = `附件清单（${parsed.attachments.length}）`;
          list.appendChild(heading);
          for (const attachment of parsed.attachments) {
            const row = document.createElement("div");
            row.className = "email-attachment";
            const name = document.createElement("span");
            name.textContent = attachment.name || "未命名附件";
            const meta = document.createElement("small");
            meta.textContent = attachment.type || "附件";
            row.append(name, meta);
            list.appendChild(row);
          }
          page.appendChild(list);
        }

        wrapper.appendChild(page);
        els.viewer.appendChild(wrapper);
      }

      function appendEmailField(parent, label, value) {
        const strong = document.createElement("strong");
        strong.textContent = label;
        const span = document.createElement("span");
        span.textContent = decodeMimeWords(value);
        parent.append(strong, span);
      }

      function firstMboxMessage(text) {
        const normalized = String(text || "").replace(/\r\n/g, "\n");
        const parts = normalized.split(/\nFrom .*\n/g).filter((part) => part.trim());
        return parts[0] || normalized;
      }

      function parseEmailMessage(raw) {
        const normalized = String(raw || "").replace(/\r\n/g, "\n");
        const splitIndex = normalized.search(/\n\n/);
        const headerText = splitIndex >= 0 ? normalized.slice(0, splitIndex) : "";
        const bodyText = splitIndex >= 0 ? normalized.slice(splitIndex + 2) : normalized;
        const headers = parseEmailHeaders(headerText);
        const contentType = headers["content-type"] || "";
        const boundary = (contentType.match(/boundary="?([^";]+)"?/i) || [])[1] || "";
        const attachments = [];
        let body = bodyText;

        if (boundary) {
          const parts = bodyText.split(`--${boundary}`);
          const readable = [];
          for (const part of parts) {
            const index = part.search(/\n\n/);
            if (index < 0) continue;
            const partHeaders = parseEmailHeaders(part.slice(0, index));
            const partBody = part.slice(index + 2).trim();
            const disposition = partHeaders["content-disposition"] || "";
            const partType = partHeaders["content-type"] || "";
            const fileName = extractMailFileName(disposition) || extractMailFileName(partType);

            if (/attachment/i.test(disposition) || fileName) {
              attachments.push({ name: fileName || "未命名附件", type: cleanContentType(partType) });
            } else if (/text\/plain/i.test(partType)) {
              readable.push(decodeTransferText(partBody, partHeaders["content-transfer-encoding"]));
            } else if (!readable.length && /text\/html/i.test(partType)) {
              readable.push(stripHtml(decodeTransferText(partBody, partHeaders["content-transfer-encoding"])));
            }
          }
          body = readable.filter(Boolean).join("\n\n");
        } else if (/text\/html/i.test(contentType)) {
          body = stripHtml(bodyText);
        }

        return {
          from: headers.from || "",
          to: headers.to || "",
          date: headers.date || "",
          subject: decodeMimeWords(headers.subject || ""),
          body: decodeTransferText(body.trim(), headers["content-transfer-encoding"]),
          attachments
        };
      }

      function parseEmailHeaders(text) {
        const headers = {};
        let current = "";
        for (const line of String(text || "").split("\n")) {
          if (/^\s/.test(line) && current) {
            headers[current] += ` ${line.trim()}`;
            continue;
          }
          const match = line.match(/^([^:]+):\s*(.*)$/);
          if (!match) continue;
          current = match[1].toLowerCase();
          headers[current] = match[2].trim();
        }
        return headers;
      }

      function extractMailFileName(value) {
        const encoded = String(value || "").match(/filename\*=UTF-8''([^;]+)/i);
        if (encoded) {
          try {
            return decodeURIComponent(encoded[1].replace(/^"|"$/g, ""));
          } catch {
            return encoded[1];
          }
        }
        const plain = String(value || "").match(/filename="?([^";]+)"?/i) || String(value || "").match(/name="?([^";]+)"?/i);
        return plain ? decodeMimeWords(plain[1]) : "";
      }

      function cleanContentType(value) {
        return String(value || "").split(";")[0].trim() || "附件";
      }

      function decodeTransferText(text, encoding = "") {
        const value = String(text || "").trim();
        if (/base64/i.test(encoding)) {
          try {
            const binary = atob(value.replace(/\s/g, ""));
            return new TextDecoder("utf-8").decode(Uint8Array.from(binary, (char) => char.charCodeAt(0)));
          } catch {
            return value;
          }
        }
        if (/quoted-printable/i.test(encoding)) {
          return value
            .replace(/=\n/g, "")
            .replace(/=([A-Fa-f0-9]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
        }
        return value;
      }

      function decodeMimeWords(value) {
        return String(value || "").replace(/=\?([^?]+)\?([BQ])\?([^?]+)\?=/gi, (_, charset, mode, text) => {
          try {
            if (mode.toUpperCase() === "B") {
              const binary = atob(text);
              return new TextDecoder(charset).decode(Uint8Array.from(binary, (char) => char.charCodeAt(0)));
            }
            const decoded = text.replace(/_/g, " ").replace(/=([A-Fa-f0-9]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
            return new TextDecoder(charset).decode(Uint8Array.from(decoded, (char) => char.charCodeAt(0)));
          } catch {
            return text;
          }
        });
      }

      function stripHtml(html) {
        const template = document.createElement("template");
        template.innerHTML = String(html || "");
        template.content.querySelectorAll("script, style, iframe, object").forEach((node) => node.remove());
        return template.content.textContent.replace(/\n{3,}/g, "\n\n").trim();
      }

      function renderCapabilitySummary(options = {}) {
        const info = getCapabilityInfo(state.extension);
        const title = options.title || info.title;
        const detail = options.detail || info.detail;
        const category = options.category || info.category;
        const notes = options.notes || info.notes;
        const wrapper = createPagedView("summary-view", "summary-page");
        const page = wrapper.firstElementChild;

        const icon = document.createElement("div");
        icon.className = "summary-icon";
        icon.textContent = (state.extension || "文件").slice(0, 3).toUpperCase();
        page.appendChild(icon);
        appendPageHeading(page, title, detail);
        page.appendChild(createDataSummary([
          ["格式", state.extension ? state.extension.toUpperCase() : "未知"],
          ["类别", category],
          ["大小", state.fileSize > 0 ? formatSize(state.fileSize) : "未知"],
          ["处理", "安全摘要"]
        ]));

        const stack = document.createElement("div");
        stack.className = "summary-stack";
        for (const item of notes) {
          const chip = document.createElement("div");
          chip.className = "summary-chip";
          const strong = document.createElement("strong");
          strong.textContent = item[0];
          const span = document.createElement("span");
          span.textContent = item[1];
          chip.append(strong, span);
          stack.appendChild(chip);
        }
        page.appendChild(stack);

        clearViewer();
        els.viewer.appendChild(wrapper);
      }

      function createPagedView(wrapperClass, pageClass) {
        const wrapper = document.createElement("div");
        wrapper.className = wrapperClass;
        const page = document.createElement("article");
        page.className = pageClass;
        wrapper.appendChild(page);
        return wrapper;
      }

      function appendPageHeading(page, title, detail) {
        const heading = document.createElement("h2");
        heading.textContent = title;
        const p = document.createElement("p");
        p.textContent = detail;
        page.append(heading, p);
      }

      function createDataSummary(items) {
        const summary = document.createElement("div");
        summary.className = "data-summary";
        for (const [label, value] of items) {
          const chip = document.createElement("div");
          chip.className = "data-chip";
          const strong = document.createElement("strong");
          strong.textContent = label;
          const span = document.createElement("span");
          span.textContent = value;
          chip.append(strong, span);
          summary.appendChild(chip);
        }
        return summary;
      }

      async function renderOpenXml(kind) {
        if (!("DecompressionStream" in window)) {
          showStatus("当前浏览器不支持本地 Office 解压预览", "请使用最新版 Chrome、Edge 或 Firefox，或下载文件后打开。", "error");
          return;
        }

        showStatus("正在解析文档", "文档会在浏览器本地渲染，不会发送到外部预览服务。");
        const response = await fetch(state.fileUrl, { credentials: "include" });
        if (!response.ok) throw new Error(`文档读取失败：HTTP ${response.status}`);

        const zip = await loadZip(await response.arrayBuffer());
        if (kind === "docx") await renderDocx(zip);
        if (kind === "xlsx") await renderXlsx(zip);
        if (kind === "pptx") await renderPptx(zip);
      }

      async function renderDocx(zip) {
        const documentXml = await zip.text("word/document.xml");
        if (!documentXml) throw new Error("DOCX 缺少 word/document.xml。");

        const xml = parseXml(documentXml);
        const body = firstByLocalName(xml, "body") || xml.documentElement;
        const page = createDocPage();

        for (const child of elementChildren(body)) {
          if (localName(child) === "p") {
            const paragraph = createDocParagraph(child);
            if (paragraph) page.appendChild(paragraph);
          } else if (localName(child) === "tbl") {
            page.appendChild(createDocTable(child));
          }
        }

        if (!page.childElementCount) {
          const empty = document.createElement("p");
          empty.textContent = "文档没有可提取的正文内容。";
          page.appendChild(empty);
        }

        showDocPage(page);
      }

      async function renderXlsx(zip) {
        const sharedStrings = await readSharedStrings(zip);
        const worksheetNames = zip.names()
          .filter((name) => /^xl\/worksheets\/sheet\d+\.xml$/i.test(name))
          .sort(compareNumberedPath);

        if (!worksheetNames.length) throw new Error("XLSX 缺少 worksheet 数据。");

        const page = createDocPage();
        for (let index = 0; index < Math.min(worksheetNames.length, 5); index += 1) {
          const xml = parseXml(await zip.text(worksheetNames[index]));
          const section = document.createElement("section");
          section.className = "sheet-section";

          const heading = document.createElement("h2");
          heading.textContent = `Sheet ${index + 1}`;
          section.appendChild(heading);

          section.appendChild(createSheetTable(xml, sharedStrings));
          page.appendChild(section);
        }
        showDocPage(page);
      }

      async function renderPptx(zip) {
        const slideNames = zip.names()
          .filter((name) => /^ppt\/slides\/slide\d+\.xml$/i.test(name))
          .sort(compareNumberedPath);

        if (!slideNames.length) throw new Error("PPTX 缺少 slide 数据。");

        const page = createDocPage();
        for (let index = 0; index < Math.min(slideNames.length, 30); index += 1) {
          const xml = parseXml(await zip.text(slideNames[index]));
          const section = document.createElement("section");
          section.className = "slide-section";

          const heading = document.createElement("h2");
          heading.textContent = `Slide ${index + 1}`;
          section.appendChild(heading);

          const paragraphs = allByLocalName(xml, "p")
            .map((node) => collectText(node).trim())
            .filter(Boolean);

          if (paragraphs.length) {
            for (const text of paragraphs) {
              const p = document.createElement("p");
              p.textContent = text;
              section.appendChild(p);
            }
          } else {
            const p = document.createElement("p");
            p.textContent = "此页没有可提取文本。";
            section.appendChild(p);
          }

          page.appendChild(section);
        }
        showDocPage(page);
      }

      function createDocPage() {
        const page = document.createElement("article");
        page.className = "doc-page";
        return page;
      }

      function showDocPage(page) {
        clearViewer();
        const wrapper = document.createElement("div");
        wrapper.className = "doc-view";
        wrapper.appendChild(page);
        els.viewer.appendChild(wrapper);
      }

      function createDocParagraph(node) {
        const text = collectText(node);
        const style = getParagraphStyle(node).toLowerCase();
        const trimmed = text.trim();

        if (!trimmed && !text.includes("\n")) return null;

        let tag = "p";
        if (style.includes("title")) tag = "h1";
        if (style.includes("heading1") || style.includes("heading 1")) tag = "h2";
        if (style.includes("heading2") || style.includes("heading 2")) tag = "h3";

        const element = document.createElement(tag);
        element.textContent = text;
        return element;
      }

      function createDocTable(tbl) {
        const table = document.createElement("table");
        for (const rowNode of elementChildren(tbl).filter((node) => localName(node) === "tr")) {
          const row = document.createElement("tr");
          const cells = elementChildren(rowNode).filter((node) => localName(node) === "tc");
          for (const cellNode of cells) {
            const cell = document.createElement("td");
            const parts = allByLocalName(cellNode, "p")
              .map((p) => collectText(p).trim())
              .filter(Boolean);
            cell.textContent = parts.join("\n");
            row.appendChild(cell);
          }
          table.appendChild(row);
        }
        return table;
      }

      function getParagraphStyle(node) {
        const pPr = elementChildren(node).find((child) => localName(child) === "pPr");
        if (!pPr) return "";
        const pStyle = elementChildren(pPr).find((child) => localName(child) === "pStyle");
        return pStyle ? attr(pStyle, "val") : "";
      }

      async function readSharedStrings(zip) {
        const xmlText = await zip.text("xl/sharedStrings.xml");
        if (!xmlText) return [];
        const xml = parseXml(xmlText);
        return allByLocalName(xml, "si").map((node) => collectText(node));
      }

      function createSheetTable(xml, sharedStrings) {
        const table = document.createElement("table");
        table.className = "sheet-table";
        const rows = allByLocalName(xml, "row").slice(0, 200);
        let maxCol = 0;
        const matrix = rows.map((row) => {
          const values = [];
          for (const cell of elementChildren(row).filter((node) => localName(node) === "c")) {
            const ref = attr(cell, "r");
            const col = ref ? columnIndex(ref.replace(/\d+/g, "")) : values.length;
            values[col] = readCellValue(cell, sharedStrings);
            maxCol = Math.max(maxCol, col);
          }
          return values;
        });

        for (const values of matrix) {
          const tr = document.createElement("tr");
          for (let col = 0; col <= Math.min(maxCol, 30); col += 1) {
            const td = document.createElement("td");
            td.textContent = values[col] || "";
            tr.appendChild(td);
          }
          table.appendChild(tr);
        }

        return table;
      }

      function readCellValue(cell, sharedStrings) {
        const type = attr(cell, "t");
        if (type === "inlineStr") {
          const inline = firstByLocalName(cell, "is");
          return inline ? collectText(inline) : "";
        }

        const valueNode = firstByLocalName(cell, "v");
        const raw = valueNode ? valueNode.textContent : "";
        if (type === "s") return sharedStrings[Number(raw)] || "";
        return raw;
      }

      function columnIndex(letters) {
        let value = 0;
        for (const char of String(letters || "").toUpperCase()) {
          const code = char.charCodeAt(0);
          if (code < 65 || code > 90) continue;
          value = value * 26 + (code - 64);
        }
        return Math.max(0, value - 1);
      }

      function compareNumberedPath(left, right) {
        const a = Number((left.match(/(\d+)(?=\.xml$)/) || [0, 0])[1]);
        const b = Number((right.match(/(\d+)(?=\.xml$)/) || [0, 0])[1]);
        return a - b;
      }

      function parseXml(text) {
        const xml = new DOMParser().parseFromString(text, "application/xml");
        if (xml.getElementsByTagName("parsererror").length) {
          throw new Error("文档 XML 解析失败。");
        }
        return xml;
      }

      function collectText(node) {
        let output = "";
        const walk = (current) => {
          for (const child of current.childNodes || []) {
            const name = localName(child);
            if (name === "t") {
              output += child.textContent || "";
            } else if (name === "tab") {
              output += "\t";
            } else if (name === "br" || name === "cr") {
              output += "\n";
            } else {
              walk(child);
            }
          }
        };
        walk(node);
        return output;
      }

      function allByLocalName(root, name) {
        const found = [];
        const walk = (node) => {
          if (localName(node) === name) found.push(node);
          for (const child of node.childNodes || []) walk(child);
        };
        walk(root);
        return found;
      }

      function firstByLocalName(root, name) {
        return allByLocalName(root, name)[0] || null;
      }

      function elementChildren(node) {
        return Array.from(node.childNodes || []).filter((child) => child.nodeType === 1);
      }

      function localName(node) {
        return String(node?.localName || node?.nodeName || "").split(":").pop();
      }

      function attr(node, name) {
        if (!node) return "";
        return node.getAttribute(name)
          || node.getAttribute(`w:${name}`)
          || node.getAttribute(`r:${name}`)
          || node.getAttribute(`a:${name}`)
          || "";
      }

      async function loadZip(arrayBuffer) {
        const bytes = new Uint8Array(arrayBuffer);
        const view = new DataView(arrayBuffer);
        const eocd = findEndOfCentralDirectory(view);
        if (eocd < 0) throw new Error("文档不是有效的 ZIP/OpenXML 文件。");

        const totalEntries = view.getUint16(eocd + 10, true);
        const centralDirectoryOffset = view.getUint32(eocd + 16, true);
        const entries = new Map();
        let offset = centralDirectoryOffset;

        for (let index = 0; index < totalEntries; index += 1) {
          if (view.getUint32(offset, true) !== 0x02014b50) break;

          const flags = view.getUint16(offset + 8, true);
          const method = view.getUint16(offset + 10, true);
          const compressedSize = view.getUint32(offset + 20, true);
          const uncompressedSize = view.getUint32(offset + 24, true);
          const fileNameLength = view.getUint16(offset + 28, true);
          const extraLength = view.getUint16(offset + 30, true);
          const commentLength = view.getUint16(offset + 32, true);
          const localHeaderOffset = view.getUint32(offset + 42, true);
          const nameBytes = bytes.slice(offset + 46, offset + 46 + fileNameLength);
          const fileName = decodeZipName(nameBytes, flags);

          entries.set(fileName, {
            method,
            compressedSize,
            uncompressedSize,
            localHeaderOffset,
            isDirectory: fileName.endsWith("/")
          });

          offset += 46 + fileNameLength + extraLength + commentLength;
        }

        async function bytesFor(name) {
          const entry = entries.get(name);
          if (!entry) return null;
          if (view.getUint32(entry.localHeaderOffset, true) !== 0x04034b50) {
            throw new Error(`ZIP 内部条目头缺失：${name}`);
          }

          const fileNameLength = view.getUint16(entry.localHeaderOffset + 26, true);
          const extraLength = view.getUint16(entry.localHeaderOffset + 28, true);
          const start = entry.localHeaderOffset + 30 + fileNameLength + extraLength;
          const compressed = bytes.slice(start, start + entry.compressedSize);

          if (entry.method === 0) return compressed;
          if (entry.method === 8) return inflateRaw(compressed);
          throw new Error(`不支持的 ZIP 压缩方式：${entry.method}`);
        }

        return {
          names: () => Array.from(entries.keys()),
          entries: () => Array.from(entries, ([name, entry]) => ({ name, ...entry })),
          bytes: bytesFor,
          text: async (name) => {
            const data = await bytesFor(name);
            return data ? new TextDecoder("utf-8").decode(data) : "";
          }
        };
      }

      function findEndOfCentralDirectory(view) {
        const min = Math.max(0, view.byteLength - 0xffff - 22);
        for (let offset = view.byteLength - 22; offset >= min; offset -= 1) {
          if (view.getUint32(offset, true) === 0x06054b50) return offset;
        }
        return -1;
      }

      function decodeZipName(bytes, flags) {
        const decoder = new TextDecoder((flags & 0x0800) ? "utf-8" : "utf-8");
        return decoder.decode(bytes);
      }

      async function inflateRaw(bytes) {
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
        return new Uint8Array(await new Response(stream).arrayBuffer());
      }

      function showStatus(title, detail = "", variant = "") {
        els.viewer.className = "viewer";
        clearViewer();
        const status = document.createElement("div");
        status.className = `status ${variant}`.trim();
        if (!variant) {
          const spinner = document.createElement("div");
          spinner.className = "spinner";
          status.appendChild(spinner);
        }
        const strong = document.createElement("strong");
        strong.textContent = title;
        status.appendChild(strong);
        if (detail) {
          const span = document.createElement("span");
          span.textContent = detail;
          status.appendChild(span);
        }
        els.viewer.appendChild(status);
      }

      async function copyDirectLink() {
        if (!state.fileUrl) return;
        try {
          await navigator.clipboard.writeText(state.fileUrl);
          els.copyBtn.textContent = "已复制";
          window.setTimeout(() => {
            els.copyBtn.textContent = "复制直链";
          }, 1400);
        } catch {
          window.prompt("复制直链", state.fileUrl);
        }
      }

      function downloadFile() {
        if (!state.fileUrl) return;
        const link = document.createElement("a");
        link.href = state.fileUrl;
        link.download = state.fileName || "download";
        document.body.appendChild(link);
        link.click();
        link.remove();
      }
    })();
  </script>
</body>

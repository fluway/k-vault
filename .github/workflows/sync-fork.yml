name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # 终极环境变量配置：覆盖Runner+Action所有层级
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_RUNNER_FORCE_NODE_VERSION: 24
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true # 兜底兼容
    concurrency:
      group: sync-fork-upstream
      cancel-in-progress: true
    steps:
      # 使用最新版Action + 单独指定环境变量
      - name: Checkout fork repo
        uses: actions/checkout@v4.4.0 # 截至2026.03最新版
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_FORK_TOKEN }}
          ref: main
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Node.js 24
        uses: actions/setup-node@v4.1.0 # 截至2026.03最新版
        with:
          node-version: 24.10.0 # 最新稳定版
          check-latest: true
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # 以下步骤完全不变（功能逻辑无问题）
      - name: Validate PAT token
        run: |
          if [ -z "${{ secrets.SYNC_FORK_TOKEN }}" ]; then
            echo "❌ 未配置SYNC_FORK_TOKEN！"
            exit 1
          fi

      - name: Add and verify upstream repo
        run: |
          UPSTREAM_REPO="https://github.com/katelya77/K-Vault.git"
          if ! git ls-remote "$UPSTREAM_REPO" > /dev/null 2>&1; then
            echo "❌ 上游仓库无法访问：$UPSTREAM_REPO"
            exit 1
          fi
          git remote add upstream "$UPSTREAM_REPO" || git remote set-url upstream "$UPSTREAM_REPO"
          git fetch upstream --prune
          echo "✅ 成功连接上游仓库"

      - name: Merge upstream changes to main
        id: merge
        run: |
          git checkout main
          git pull origin main --no-edit
          if git merge upstream/main --no-edit --no-ff; then
            echo "✅ 成功合并上游代码"
            git push origin main
            echo "✅ 已推送到Fork仓库"
          else
            echo "❌ 合并冲突"
            exit 1
          fi

      - name: Handle merge conflicts
        if: steps.merge.outcome == 'failure'
        run: |
          echo "📌 合并冲突！请手动解决后重试"
          exit 1

name: Sync Fork with Upstream

# 触发条件：1. 每天凌晨2点自动运行 2. 手动触发
on:
  schedule:
    - cron: '0 2 * * *' # 每天UTC时间2点（北京时间10点）运行，可按需修改
  workflow_dispatch: # 允许手动触发同步

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前 fork 仓库代码
      - name: Checkout fork repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取所有历史，避免同步冲突
          token: ${{ secrets.SYNC_FORK_TOKEN }} # 使用刚才配置的PAT

      # 2. 添加源项目为 upstream 远程仓库
      - name: Add upstream repo
        run: |
          # 替换这里的 URL 为 K-Vault 源项目的仓库地址（不是你的 fork）
          git remote add upstream https://github.com/katelya77/K-Vault.git
          git fetch upstream

      # 3. 合并 upstream 的 main 分支到本地 fork 的 main 分支
      - name: Merge upstream changes
        run: |
          git checkout main
          git merge upstream/main --no-edit # --no-edit 避免手动填写合并信息
          git push origin main # 推送到你的 fork 仓库

      # 4. 处理合并冲突（可选，若有冲突会自动失败，需手动解决）
      - name: Handle merge conflicts (optional)
        if: failure()
        run: |
          echo "合并冲突，请手动解决后再运行同步！"
          exit 1

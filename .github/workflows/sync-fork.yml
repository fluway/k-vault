name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

# 全局环境变量：强制使用 Node.js 24 运行 JavaScript Action
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sync-fork-upstream
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 升级 checkout 到 v4.2.0+（支持 Node.js 24）
      - name: Checkout fork repo
        uses: actions/checkout@v4.2.1 # 或直接用 v4（会拉取最新兼容版本）
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_FORK_TOKEN }}
          ref: main

      # 2. 可选：显式设置 Node.js 24 环境（进一步确保兼容性）
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # 后续步骤不变（添加上游仓库、合并代码等）
      - name: Validate PAT token
        run: |
          if [ -z "${{ secrets.SYNC_FORK_TOKEN }}" ]; then
            echo "❌ 未配置SYNC_FORK_TOKEN！"
            exit 1
          fi

      - name: Add and verify upstream repo
        run: |
          UPSTREAM_REPO="https://github.com/katelya77/K-Vault.git"
          if ! git ls-remote "$UPSTREAM_REPO" > /dev/null 2>&1; then
            echo "❌ 上游仓库无法访问：$UPSTREAM_REPO"
            exit 1
          fi
          git remote add upstream "$UPSTREAM_REPO" || git remote set-url upstream "$UPSTREAM_REPO"
          git fetch upstream --prune
          echo "✅ 成功连接上游仓库"

      - name: Merge upstream changes to main
        id: merge
        run: |
          git checkout main
          git pull origin main --no-edit
          if git merge upstream/main --no-edit --no-ff; then
            echo "✅ 成功合并上游代码"
            git push origin main
            echo "✅ 已推送到Fork仓库"
          else
            echo "❌ 合并冲突"
            exit 1
          fi

      - name: Handle merge conflicts
        if: steps.merge.outcome == 'failure'
        run: |
          echo "📌 合并冲突！请手动解决后重试"
          exit 1

name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # 核心环境变量：强制Node.js 24，同时兼容过渡期
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_RUNNER_FORCE_NODE_VERSION: 24
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    concurrency:
      group: sync-fork-upstream
      cancel-in-progress: true
    steps:
      # 使用checkout官方已发布的最新稳定版（v4 会自动拉取最新兼容版本）
      - name: Checkout fork repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_FORK_TOKEN }}
          ref: main
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # 使用setup-node已发布的最新稳定版
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x # 自动适配24系列最新稳定版
          check-latest: true
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Validate PAT token
        run: |
          if [ -z "${{ secrets.SYNC_FORK_TOKEN }}" ]; then
            echo "❌ 未配置SYNC_FORK_TOKEN！"
            exit 1
          fi

      - name: Add and verify upstream repo
        run: |
          UPSTREAM_REPO="https://github.com/katelya77/K-Vault.git"
          if ! git ls-remote "$UPSTREAM_REPO" > /dev/null 2>&1; then
            echo "❌ 上游仓库无法访问：$UPSTREAM_REPO"
            exit 1
          fi
          git remote add upstream "$UPSTREAM_REPO" || git remote set-url upstream "$UPSTREAM_REPO"
          git fetch upstream --prune
          echo "✅ 成功连接上游仓库"

      - name: Merge upstream changes to main
        id: merge
        run: |
          git checkout main
          git pull origin main --no-edit
          if git merge upstream/main --no-edit --no-ff; then
            echo "✅ 成功合并上游代码"
            git push origin main
            echo "✅ 已推送到Fork仓库"
          else
            echo "❌ 合并冲突"
            exit 1
          fi

      - name: Handle merge conflicts
        if: steps.merge.outcome == 'failure'
        run: |
          echo "📌 合并冲突！请按以下步骤手动解决："
          echo "1. 克隆仓库：git clone https://github.com/你的用户名/K-Vault.git"
          echo "2. 进入仓库：cd K-Vault"
          echo "3. 添加上游：git remote add upstream https://github.com/katelya77/K-Vault.git"
          echo "4. 拉取上游：git fetch upstream"
          echo "5. 合并代码：git merge upstream/main"
          echo "6. 解决冲突后提交：git add . && git commit -m 'resolve conflict'"
          echo "7. 推送：git push origin main"
          exit 1
